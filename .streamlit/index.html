<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Meta Tags para Preview em Redes Sociais (Open Graph) -->
    <meta property="og:title" content="🔮 Tarô Místico - Sua Revelação Sagrada">
    <meta property="og:description" content="Um portal para o autoconhecimento através dos arquétipos universais. Receba uma leitura de tarô personalizada e profunda.">
    <meta property="og:image" content="https://github.com/neochupacabras/taro-mistico-app/blob/main/images/pergaminho4.png">
    <meta property="og:url" content="https://taro-mistico-app.onrender.com">
    <meta property="og:type" content="website">

    <!-- Meta Tags para o Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <!-- O Streamlit precisa deste título, ele será substituído pelo page_title do seu script -->
    <title>Tarô Místico</title>

    <!-- O Streamlit injetará seus scripts e estilos aqui -->
    %STREAMLIT_APP_SCRIPTS%
</head>
<body>
    <!-- Fallback para navegadores sem JavaScript -->
    <noscript>Você precisa habilitar o JavaScript para rodar esta aplicação.</noscript>

    <!-- O Streamlit precisa destas seções para montar a aplicação -->
    <div id="root"></div>
    <section id="streamlit-root"></section>
</body>
</html>
